name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_NAME: 'complidemoacr'
  RG_NAME: 'complidemo-rg'
  FRONTEND_APP_NAME: 'complidemo-frontend'
  BACKEND_APP_NAME: 'complidemo-backend'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Azure OIDC Auth
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log into Azure using Federated Credentials (OIDC - highly recommended for compliance)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # Build and push Backend Image
      - name: Build and Push Backend
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} ./backend
          docker tag ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/backend:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/backend:latest

      # Build and push Frontend Image
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} ./frontend
          docker tag ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/frontend:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/frontend:latest

      # Deploy Backend to Azure Container Apps
      - name: Deploy Backend to ACA
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RG_NAME }}
          containerAppName: ${{ env.BACKEND_APP_NAME }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}

      # Deploy Frontend to Azure Container Apps
      - name: Deploy Frontend to ACA
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RG_NAME }}
          containerAppName: ${{ env.FRONTEND_APP_NAME }}
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
